name: novapay-ci
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        run: mvn -f app/pom.xml clean package
      - name: Test
        run: mvn -f app/pom.xml test
      - name: SonarQube
        run: echo "Simulated SonarQube stage"
      - name: Docker Build
        run: docker build -t novapay-app:latest app
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: novapay-app:latest
      - name: Push Image
        run: echo "Simulated docker push stage"
      - name: Deploy
        run: echo "Simulated Helm/Kubernetes deploy stage"
