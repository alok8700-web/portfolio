apiVersion: apps/v1
kind: Deployment
metadata:
  name: novapay-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: novapay-app
  template:
    metadata:
      labels:
        app: novapay-app
    spec:
      containers:
      - name: novapay-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.containerPort }}
